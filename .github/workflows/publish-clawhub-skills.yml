name: Publish Skills to ClawHub

on:
  push:
    tags:
      - "skills-v*"

jobs:
  publish:
    name: Publish Memsy skills to ClawHub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install clawhub CLI
        run: npm install -g clawhub

      # ── Claude Code skills ────────────────────────────────────────────────
      - name: Publish memsy-recall (Claude Code)
        working-directory: plugins/claude-code/skills/memsy-recall
        run: |
          clawhub publish . \
            --slug memsy-recall \
            --name "Memsy Recall" \
            --version "${GITHUB_REF_NAME#skills-v}" \
            --changelog "Release ${GITHUB_REF_NAME}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish memsy-remember (Claude Code)
        working-directory: plugins/claude-code/skills/memsy-remember
        run: |
          clawhub publish . \
            --slug memsy-remember \
            --name "Memsy Remember" \
            --version "${GITHUB_REF_NAME#skills-v}" \
            --changelog "Release ${GITHUB_REF_NAME}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      # ── OpenClaw skills ───────────────────────────────────────────────────
      - name: Publish memsy-recall (OpenClaw)
        working-directory: plugins/openclaw/skills/memsy-recall
        run: |
          clawhub publish . \
            --slug memsy-recall-openclaw \
            --name "Memsy Recall (OpenClaw)" \
            --version "${GITHUB_REF_NAME#skills-v}" \
            --changelog "Release ${GITHUB_REF_NAME}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish memsy-remember (OpenClaw)
        working-directory: plugins/openclaw/skills/memsy-remember
        run: |
          clawhub publish . \
            --slug memsy-remember-openclaw \
            --name "Memsy Remember (OpenClaw)" \
            --version "${GITHUB_REF_NAME#skills-v}" \
            --changelog "Release ${GITHUB_REF_NAME}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
